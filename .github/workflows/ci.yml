name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: web (typecheck · lint · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install (reproducible)
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (production)
        run: npm run build
        env:
          # Placeholder values so env validation passes at build time — the build compiles
          # code and never connects to Supabase/OpenRouter. Real values live in Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: build-placeholder
          SUPABASE_SECRET_KEY: build-placeholder
          NEXT_PUBLIC_APP_URL: https://slicematic.example

      - name: Audit (high+)
        run: npm audit --audit-level=high

  forecast:
    name: forecast-service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forecast-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: forecast-service/requirements.txt

      - name: Install
        run: pip install -r requirements.txt

      - name: Test (model logic — no DB)
        run: pytest -q
